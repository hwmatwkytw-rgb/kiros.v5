<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>نظام ڪايࢪوس المتطور</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-cyan: #00f2ff;
      --neon-purple: #bc13fe;
      --glass: rgba(255, 255, 255, 0.05);
      --glow: 0 0 15px rgba(0, 242, 255, 0.5);
    }

    body {
      margin: 0;
      background: #020205;
      color: #fff;
      font-family: 'Cairo', sans-serif;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px 0;
    }

    #particle-canvas {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0;
    }

    .main-container {
      position: relative;
      z-index: 2;
      text-align: center;
      width: 90%;
      max-width: 600px;
    }

    /* تأثير الكتابة السحابية المضيئة */
    .bot-name {
      font-size: clamp(40px, 8vw, 70px);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-purple);
      animation: float 4s ease-in-out infinite;
      cursor: pointer;
      margin-bottom: 5px;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-15px) scale(1.05); }
    }

    /* شريط الحالة والتحميل */
    .system-monitor {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 20px 0;
    }

    .mon-card {
      background: var(--glass);
      border: 1px solid rgba(0, 242, 255, 0.2);
      padding: 10px;
      border-radius: 12px;
      backdrop-filter: blur(5px);
    }

    .mon-label { font-size: 10px; color: #aaa; text-transform: uppercase; }
    .mon-val { font-family: 'Orbitron'; color: var(--neon-cyan); font-size: 14px; }

    /* الرادار */
    .radar-box {
      width: 180px; height: 180px;
      border-radius: 50%;
      border: 2px solid var(--neon-cyan);
      margin: 30px auto;
      position: relative;
      background: radial-gradient(circle, rgba(0, 242, 255, 0.1), transparent);
      box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.2);
    }

    .radar-sweep {
      position: absolute;
      width: 50%; height: 50%;
      background: linear-gradient(45deg, transparent, var(--neon-cyan));
      top: 0; left: 50%;
      transform-origin: bottom left;
      animation: sweep 4s linear infinite;
      border-right: 1px solid var(--neon-cyan);
    }

    @keyframes sweep {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* قائمة الأوامر */
    .menu-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .menu-content {
      background: #0a0a0f;
      border: 1px solid var(--neon-purple);
      padding: 30px;
      border-radius: 20px;
      width: 80%;
      max-width: 350px;
      box-shadow: 0 0 40px var(--neon-purple);
    }

    .menu-item {
      padding: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: 0.3s;
      cursor: pointer;
    }

    .menu-item:hover { color: var(--neon-cyan); transform: translateX(-10px); }

    /* الدعاء */
    .dua-section {
      margin-top: 40px;
      padding: 20px;
      background: linear-gradient(90deg, transparent, rgba(188, 19, 254, 0.1), transparent);
      border-radius: 15px;
      font-style: italic;
      color: #ddd;
    }

  </style>
</head>
<body>

  <canvas id="particle-canvas"></canvas>

  <div class="main-container">
    <div class="bot-name" onclick="toggleMenu()">ڪايࢪوس</div>
    <div style="color: var(--neon-cyan); font-size: 12px; letter-spacing: 3px;">ACTIVE SYSTEM AI</div>

    <div class="radar-box">
      <div class="radar-sweep"></div>
      <div id="clock" style="position: absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-family:'Orbitron'; font-weight:bold;">00:00</div>
    </div>

    <div class="system-monitor">
      <div class="mon-card">
        <div class="mon-label">تحميل المعالج</div>
        <div class="mon-val" id="cpu-load">12%</div>
      </div>
      <div class="mon-card">
        <div class="mon-label">التخزين</div>
        <div class="mon-val" id="storage">42.25 GB</div>
      </div>
      <div class="mon-card">
        <div class="mon-label">وقت التشغيل</div>
        <div class="mon-val" id="uptime">01:45:10</div>
      </div>
    </div>

    <div class="dua-section">
      <p id="duaText">"اللهم بارك لنا فيما رزقتنا وقنا عذاب النار، واجعل عملنا خالصاً لوجهك الكريم."</p>
    </div>
  </div>

  <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()">
    <div class="menu-content" onclick="event.stopPropagation()">
      <h3 style="color:var(--neon-cyan)">لوحة التحكم</h3>
      <div class="menu-item">📊 تقرير الاستخدام</div>
      <div class="menu-item">🛠️ تحديث النواة</div>
      <div class="menu-item">🔒 تشفير البيانات</div>
      <div class="menu-item" style="color: #ff4d4d;" onclick="toggleMenu()">إغلاق القائمة ×</div>
    </div>
  </div>

  <script>
    // نظام الجزيئات الخلفية
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function init() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      particles = [];
      for(let i=0; i<60; i++) {
        particles.push({
          x: Math.random()*canvas.width,
          y: Math.random()*canvas.height,
          r: Math.random()*2,
          vX: Math.random()*0.4 - 0.2,
          vY: Math.random()*0.4 - 0.2
        });
      }
    }

    function draw() {
      ctx.clearRect(0,0,canvas.width, canvas.height);
      ctx.fillStyle = "rgba(0, 242, 255, 0.5)";
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fill();
        p.x += p.vX; p.y += p.vY;
        if(p.x < 0 || p.x > canvas.width) p.vX *= -1;
        if(p.y < 0 || p.y > canvas.height) p.vY *= -1;
      });
      requestAnimationFrame(draw);
    }

    // تحديث البيانات الحية
    function updateStats() {
      // محاكاة تحميل المعالج
      document.getElementById('cpu-load').textContent = Math.floor(Math.random()*20 + 5) + "%";
      
      // تحديث الوقت
      const n = new Date();
      document.getElementById('clock').textContent = n.getHours().toString().padStart(2,'0') + ":" + n.getMinutes().toString().padStart(2,'0');
    }

    function toggleMenu() {
      const m = document.getElementById('menuOverlay');
      m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
    }

    window.addEventListener('resize', init);
    init(); draw();
    setInterval(updateStats, 2000);
  </script>
</body>
</html>
